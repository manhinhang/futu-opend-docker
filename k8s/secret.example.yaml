# Reference template only — DO NOT commit a real version of this file.
#
# Prefer creating the secret out-of-band so the RSA key never lives in YAML:
#
#   kubectl create namespace futu-opend
#   kubectl create secret generic futu-credentials \
#     --namespace futu-opend \
#     --from-file=futu.pem=./futu.pem \
#     --from-literal=FUTU_ACCOUNT_ID=<your-id> \
#     --from-literal=FUTU_ACCOUNT_PWD_MD5=<md5-of-your-password>
#
# Compute the MD5 with:
#
#   echo -n '<your-password>' | md5sum | awk '{print $1}'
#
# FUTU_ACCOUNT_PWD (plaintext) is still accepted by the container as a legacy
# fallback — start.sh hashes it at runtime and emits a stderr deprecation
# warning. Prefer FUTU_ACCOUNT_PWD_MD5 so the cluster never sees plaintext.
---
apiVersion: v1
kind: Secret
metadata:
  name: futu-credentials
  namespace: futu-opend
type: Opaque
stringData:
  FUTU_ACCOUNT_ID: "REPLACE_ME"
  # 32 lowercase hex chars; compute with `echo -n '<password>' | md5sum | awk '{print $1}'`
  FUTU_ACCOUNT_PWD_MD5: "REPLACE_ME_WITH_MD5_HASH_OF_PWD_"
  # FUTU_ACCOUNT_PWD: "REPLACE_ME"  # deprecated; legacy fallback
  # The RSA key is intentionally NOT shown inline here. The recommended path
  # is `--from-file=futu.pem=./futu.pem` so the key never lives in YAML or
  # version control. If you must embed it (air-gapped GitOps, etc.), add a
  # block with the exact key name below — apiVersion, kind, and metadata
  # above stay the same:
  #
  # futu.pem: |
  #   -----BEGIN RSA PRIVATE KEY-----
  #   …
  #   -----END RSA PRIVATE KEY-----
