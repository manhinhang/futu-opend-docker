services:
  futu-opend:
    build:
      context: .
      args:
        FUTU_OPEND_VER: 8.2.4218
        BASE_IMG: ubuntu
    container_name: futu-opend
    stdin_open: true
    tty: true
    ports:
      - "11111:11111" # API port
      - "22222:22222" # Telnet port for 2FA input
    environment:
      - FUTU_OPEND_RSA_FILE_PATH=/.futu/futu.pem
    volumes:
      - $LOCAL_RSA_FILE_PATH:/.futu/futu.pem
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/11111"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s
