services:
  futu-opend:
    build:
      context: .
      # Host network for apt-get reliability — the default docker bridge
      # has connectivity issues with archive.ubuntu.com on some setups.
      # If your Docker daemon disallows host-network builds (security
      # policy), drop this line and rely on bridge net for the build.
      network: host
      args:
        FUTU_OPEND_VER: ${FUTU_OPEND_VER}
        BASE_IMG: ubuntu
    container_name: futu-opend
    stdin_open: true
    tty: true
    # Host network for OpenD's outbound to Futu — the docker bridge silently
    # produces ">>>登录失败,网络异常" within ~45s of login on some setups
    # even with healthy creds. Host net consistently works. Side effect:
    # container ports bind directly on the host (no port mapping needed);
    # FUTU_OPEND_IP must be a routable bind address (default 0.0.0.0 below).
    network_mode: host
    # No `ports:` block — `network_mode: host` ignores port mappings (with
    # a warning) and binds container ports directly on the host.
    # No `env_file:` — values come from `environment:` below via compose-time
    # interpolation. Bare `docker compose up` auto-loads .env; the e2e test
    # passes `--env-file .env.e2e`.
    environment:
      FUTU_ACCOUNT_ID: ${FUTU_ACCOUNT_ID:-}
      FUTU_ACCOUNT_PWD: ${FUTU_ACCOUNT_PWD:-}
      FUTU_ACCOUNT_PWD_MD5: ${FUTU_ACCOUNT_PWD_MD5:-}
      FUTU_OPEND_RSA_FILE_PATH: /.futu/futu.pem
      FUTU_OPEND_IP: ${FUTU_OPEND_IP:-0.0.0.0}
      FUTU_OPEND_PORT: ${FUTU_OPEND_PORT:-11111}
      FUTU_OPEND_TELNET_PORT: ${FUTU_OPEND_TELNET_PORT:-22222}
      FUTU_OPEND_WEBSOCKET_PORT: ${FUTU_OPEND_WEBSOCKET_PORT:-}
      FUTU_OPEND_WEBSOCKET_IP: ${FUTU_OPEND_WEBSOCKET_IP:-}
    volumes:
      - $LOCAL_RSA_FILE_PATH:/.futu/futu.pem
      # FutuOpenD writes its runtime state (device-whitelist token, login
      # cache, captcha PNG) here. Persisting it across recreates lets Futu
      # skip SMS until the server-side whitelist window expires.
      - futu-opend-data:/home/futu/.com.futunn.FutuOpenD
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/11111"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  futu-opend-data:
