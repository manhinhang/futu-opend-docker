name: Check Futu OpenD Version Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check Futu OpenD Version
        run: node script/check_version.js

      - name: Sync version references
        run: node script/update_docs_version.js

      - name: Create Pull Request with Auto-Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          SYNC_FILES="opend_version.json $(node -e "console.log(require('./script/update_docs_version.js').TARGET_FILES.join(' '))")"
          BRANCH=update-futu-opend-version

          if git diff --quiet -- $SYNC_FILES; then
            echo "No version update needed"
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          EXISTING_PRS=$(gh pr list --head "$BRANCH" --state open --json number --jq ".[].number")
          if [ -n "$EXISTING_PRS" ]; then
            echo "Closing existing PR(s) on $BRANCH..."
            echo "$EXISTING_PRS" | xargs -I {} gh pr close {} --delete-branch || true
          fi

          git checkout -b "$BRANCH"
          git add $SYNC_FILES
          git commit -m "Update Futu OpenD version"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "🤖 Update Futu OpenD version" \
            --body "Automated version update. This PR will be automatically merged once all CI/CD checks pass." \
            --base main)
          PR_NUMBER="${PR_URL##*/}"

          echo "Pull Request created: $PR_URL"
          echo "Enabling auto-merge for PR #$PR_NUMBER..."
          gh pr merge "$PR_NUMBER" --auto --squash --delete-branch
