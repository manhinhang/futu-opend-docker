# Compose override used only by the local e2e test (script/e2e.test.mjs).
#
# - Builds a fresh image from the in-tree Dockerfile so the test exercises
#   this branch's start.sh (the published image's start.sh may predate the
#   env-driven WebSocket block from commit bdf6123).
# - Reads container env from .env.e2e (generated at test start from
#   FUTU_ACCOUNT_ID / FUTU_ACCOUNT_PWD env vars). The base compose uses .env,
#   which has empty values.
# - Adds the WebSocket port mapping (33333) so the host can reach OpenD's
#   WebSocket listener. The listener itself is enabled by start.sh inside
#   the container when FUTU_OPEND_WEBSOCKET_PORT is set in .env.e2e.
#
# Compose with: docker compose -f docker-compose.yaml -f docker-compose.e2e.yaml ...

services:
  futu-opend:
    build:
      context: .
      args:
        FUTU_OPEND_VER: ${FUTU_OPEND_VER}
        BASE_IMG: ubuntu
    env_file:
      - !reset null
      - .env.e2e
    ports:
      - "33333:33333"
